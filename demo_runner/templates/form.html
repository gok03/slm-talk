<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 32px; max-width: 480px; }
    h1 { color: #58a6ff; font-size: 18px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; background: #161b22; border: 1px solid #30363d;
            border-radius: 4px; color: #c9d1d9; font-size: 14px; }
    input:focus { outline: none; border-color: #58a6ff; }
    button { margin-top: 8px; background: #238636; color: #fff; border: none; padding: 10px 24px;
             border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button:hover { background: #2ea043; }
    #banner { display: none; margin-bottom: 20px; background: #238636; color: #fff;
              padding: 12px 16px; border-radius: 4px; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Invoice Submission</h1>
  <div id="banner">✓ Submitted</div>
  <form onsubmit="handleSubmit(event)">
    <div class="field">
      <label>Invoice Number</label>
      <input id="invoice_number" name="invoice_number" type="text">
    </div>
    <div class="field">
      <label>Date</label>
      <input id="date" name="date" type="text">
    </div>
    <div class="field">
      <label>Total</label>
      <input id="total" name="total" type="text">
    </div>
    <button type="submit">Submit</button>
  </form>
  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('banner').style.display = 'block';
    }

  </script>
</body>
</html>
